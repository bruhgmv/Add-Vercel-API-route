<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="cyber-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background Card -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="#030303" stroke="#22d3ee" stroke-width="4" />
  
  <!-- Outer Neon Accents -->
  <rect x="22" y="22" width="84" height="84" rx="16" fill="none" stroke="#ec4899" stroke-width="2" stroke-dasharray="8 6" opacity="0.8" />
  
  <!-- Inner Microprocessor Core -->
  <rect x="38" y="38" width="52" height="52" rx="10" fill="url(#cyber-gradient)" filter="url(#neon-glow)" />
  
  <!-- Corner Pins of the CPU -->
  <rect x="34" y="48" width="4" height="6" rx="1" fill="#ffffff" />
  <rect x="34" y="60" width="4" height="6" rx="1" fill="#ffffff" />
  <rect x="34" y="72" width="4" height="6" rx="1" fill="#ffffff" />
  
  <rect x="90" y="48" width="4" height="6" rx="1" fill="#ffffff" />
  <rect x="90" y="60" width="4" height="6" rx="1" fill="#ffffff" />
  <rect x="90" y="72" width="4" height="6" rx="1" fill="#ffffff" />
  
  <rect x="48" y="34" width="6" height="4" rx="1" fill="#ffffff" />
  <rect x="60" y="34" width="6" height="4" rx="1" fill="#ffffff" />
  <rect x="72" y="34" width="6" height="4" rx="1" fill="#ffffff" />
  
  <rect x="48" y="90" width="6" height="4" rx="1" fill="#ffffff" />
  <rect x="60" y="90" width="6" height="4" rx="1" fill="#ffffff" />
  <rect x="72" y="90" width="6" height="4" rx="1" fill="#ffffff" />
  
  <!-- Center Core Star/Sparkle -->
  <path d="M64 50 L66 62 L78 64 L66 66 L64 78 L62 66 L50 64 L62 62 Z" fill="#ffffff" />
</svg>
